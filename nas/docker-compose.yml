services:

  # в”Ђв”Ђ Media Server в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    profiles: ["plex"]
    networks: [media]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    ports:
      - ${LAN_IP}:32400:32400
    volumes:
      - ${INSTALL_DIR}/plex/config:/config
      - ${DATA_ROOT}/Media:/media
    # Uncomment for Intel Arc / NVIDIA GPU transcoding:
    # devices:
    #   - /dev/dri:/dev/dri
    restart: unless-stopped

  tautulli:
    image: linuxserver/tautulli:latest
    container_name: tautulli
    profiles: ["plex"]
    networks: [media]
    depends_on: [plex]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:8181:8181
    volumes:
      - ${INSTALL_DIR}/tautulli/config:/config
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    profiles: ["plex"]
    init: true
    user: "${PUID}:${PGID}"
    networks: [media]
    depends_on: [plex]
    environment:
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:5056:5055
    volumes:
      - ${INSTALL_DIR}/seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  # в”Ђв”Ђ Dashboard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    profiles: ["homepage"]
    networks: [media]
    environment:
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=*
    ports:
      - ${LAN_IP}:3000:3000
    volumes:
      - ${INSTALL_DIR}/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # в”Ђв”Ђ Indexer / Management в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    networks: [media]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49150:9696
    volumes:
      - ${INSTALL_DIR}/prowlarr/config:/config
    healthcheck:
      test: curl -sf http://localhost:9696/api/v1/system/status?apikey=none > /dev/null || exit 0
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    networks: [media]
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:8191:8191
    healthcheck:
      test: curl -sf http://localhost:8191/ || exit 1
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    profiles: ["sonarr"]
    networks: [media]
    depends_on: [prowlarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49152:8989
    volumes:
      - ${INSTALL_DIR}/sonarr/config:/config
      - ${DATA_ROOT}:/data
    healthcheck:
      test: curl -sf http://localhost:8989/api/v3/system/status > /dev/null || exit 1
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    profiles: ["radarr"]
    networks: [media]
    depends_on: [prowlarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49151:7878
    volumes:
      - ${INSTALL_DIR}/radarr/config:/config
      - ${DATA_ROOT}:/data
    healthcheck:
      test: curl -sf http://localhost:7878/api/v3/system/status > /dev/null || exit 1
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    profiles: ["bazarr"]
    networks: [media]
    depends_on: [sonarr, radarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49153:6767
    volumes:
      - ${INSTALL_DIR}/bazarr/config:/config
      - ${DATA_ROOT}:/data
    restart: unless-stopped

  lidarr:
    image: linuxserver/lidarr:latest
    container_name: lidarr
    profiles: ["lidarr"]
    networks: [media]
    depends_on: [prowlarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49154:8686
    volumes:
      - ${INSTALL_DIR}/lidarr/config:/config
      - ${DATA_ROOT}:/data
    healthcheck:
      test: curl -sf http://localhost:8686/api/v1/system/status > /dev/null || exit 1
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # в”Ђв”Ђ Download Clients в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    # Distinct "vpn" profile (not "torrenting") so the no-vpn override
    # can keep gluetun out of the start set even when qBittorrent's
    # "torrenting" profile is active. setup.sh adds "vpn" to COMPOSE_
    # PROFILES only when VPN_ENABLED=true AND ENABLE_QBITTORRENT=true.
    profiles: ["vpn"]
    cap_add:
      - NET_ADMIN
    networks: [media]
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      # Generic credential env vars вЂ” gluetun picks the right subset
      # for whichever VPN_SERVICE_PROVIDER is selected. Unused vars
      # are ignored. NORDVPN_PRIVATE_KEY is the legacy name from when
      # this stack only supported NordVPN; it's mirrored into
      # WIREGUARD_PRIVATE_KEY by the Mediarr Installer so older
      # profiles keep working.
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-${NORDVPN_PRIVATE_KEY:-}}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY:-}
      - OPENVPN_USER=${OPENVPN_USER:-}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:-}
      - SERVER_COUNTRIES=${VPN_COUNTRIES}
      # Allow LAN to reach the qBittorrent WebUI through the VPN container
      - FIREWALL_INPUT_PORTS=49156
    ports:
      - ${LAN_IP}:49156:49156
      - 6881:6881
      - 6881:6881/udp
    healthcheck:
      test: /gluetun-entrypoint healthcheck
      interval: 10s
      retries: 6
      start_period: 30s
      timeout: 5s
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    profiles: ["torrenting"]
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=49156
      - WEBUI_USERNAME=${QBITTORRENT_USER:-admin}
      - WEBUI_PASSWORD=${QBITTORRENT_PASS}
    volumes:
      - ${INSTALL_DIR}/qbittorrent/config:/config
      - ${INSTALL_DIR}/qbittorrent/custom-cont-init.d:/custom-cont-init.d:ro
      - ${DATA_ROOT}/Downloads/Torrents:/downloads
    restart: unless-stopped

  sabnzbd:
    image: linuxserver/sabnzbd:latest
    container_name: sabnzbd
    profiles: ["usenet"]
    networks: [media]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49155:8080
    volumes:
      - ${INSTALL_DIR}/sabnzbd/config:/config
      - ${DATA_ROOT}/Downloads/Usenet:/data
    restart: unless-stopped

  # в”Ђв”Ђ Maintenance в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    profiles: ["recyclarr"]
    user: "${PUID}:${PGID}"
    networks: [media]
    depends_on: [sonarr, radarr]
    environment:
      - TZ=${TZ}
      - RECYCLARR_CREATE_CONFIG=true
    volumes:
      - ${INSTALL_DIR}/recyclarr/config:/config
    restart: unless-stopped

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    profiles: ["unpackerr"]
    networks: [media]
    depends_on: [sonarr, radarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
    volumes:
      - ${INSTALL_DIR}/unpackerr/config:/config
      - ${DATA_ROOT}:/data
    restart: unless-stopped

networks:
  media:
    driver: bridge
