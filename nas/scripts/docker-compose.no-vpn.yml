# Override applied when VPN_ENABLED=false in .env. setup.sh detects the
# flag and adds `-f docker-compose.no-vpn.yml` to its compose invocation.
#
# Effect: qBittorrent runs on the regular bridge network with its ports
# bound directly to LAN_IP, no gluetun sidecar. WARNING: torrent traffic
# in this mode is NOT protected by a VPN — your real public IP is
# visible to peers.
#
# Re-enabling VPN later: set VPN_ENABLED=true in .env, fill in
# WIREGUARD_PRIVATE_KEY, then `docker compose down && bash setup.sh`.
#
# Note: gluetun is already gated by its own "vpn" profile in the base
# compose file. setup.sh only puts "vpn" into COMPOSE_PROFILES when both
# VPN_ENABLED=true AND ENABLE_QBITTORRENT=true, so we don't need to
# do anything to gluetun here — it just won't be in the start set.

services:
  qbittorrent:
    network_mode: bridge
    networks:
      - media
    ports:
      - ${LAN_IP}:49156:49156
      - 6881:6881
      - 6881:6881/udp
    # Drop the gluetun health-dependency from the base file. !reset is
    # compose v2.20+; if the user is on something older, edit setup.sh
    # to use a fully separate compose file instead of this override.
    depends_on: !reset null

  # slskd moves to the media bridge with its own published WebUI port
  # when VPN is off (mirror of the qBittorrent override above). The
  # Soulseek peer listen port (50300) is published best-effort, like
  # qBit's 6881. soularr can now reach slskd as http://slskd:5030 on the
  # bridge, but setup-arr-config.py writes the LAN_IP:5030 form
  # unconditionally so one config.ini works in both VPN modes.
  slskd:
    network_mode: bridge
    networks:
      - media
    ports:
      - ${LAN_IP}:5030:5030
      - 50300:50300
    depends_on: !reset null
