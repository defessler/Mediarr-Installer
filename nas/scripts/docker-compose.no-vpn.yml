# Override applied when VPN_ENABLED=false in .env. setup.sh detects the
# flag and adds `-f docker-compose.no-vpn.yml` to its compose invocation.
#
# Effect: qBittorrent runs on the regular bridge network with its ports
# bound directly to LAN_IP, no gluetun sidecar. WARNING: torrent traffic
# in this mode is NOT protected by a VPN — your real public IP is
# visible to peers.
#
# Re-enabling VPN later: set VPN_ENABLED=true in .env, fill in
# WIREGUARD_PRIVATE_KEY, then `docker compose down && bash setup.sh`.
#
# Note: gluetun is already gated by its own "vpn" profile in the base
# compose file. setup.sh only puts "vpn" into COMPOSE_PROFILES when both
# VPN_ENABLED=true AND ENABLE_QBITTORRENT=true, so we don't need to
# do anything to gluetun here — it just won't be in the start set.

services:
  qbittorrent:
    # CAVEAT (intentional, do not "fix" casually): declaring BOTH
    # network_mode: bridge AND networks: [media] is spec-incompatible per
    # the Compose reference, but it has been the VPN-off default since
    # v0.3.24 and works on the Compose versions this installer targets
    # (DSM Container Manager / UGREEN). The effect users rely on is qBit
    # landing on the br-media bridge (so arrs resolve it by name) with its
    # WebUI/BT ports published. A "correct" rewrite (drop network_mode and
    # keep only networks: [media]) risks changing the published-port /
    # name-resolution behavior on the exact older Compose builds here, so
    # it is left as-is. Do NOT switch this to `network_mode: !reset` — the
    # !reset tag needs Compose 2.20+ and would hard-fail VPN-off installs
    # on the pre-2.20 builds setup-validate.sh only warns about.
    network_mode: bridge
    networks:
      - media
    # Re-assert the no-new-privileges hardening here. In VPN mode qBit is
    # in network_mode: container:gluetun and MUST omit security_opt (Docker
    # rejects security_opt on a namespace-sharing container) — it inherits
    # gluetun's. With VPN off qBit runs on the bridge in its OWN namespace,
    # so the base file's *security hardening no longer reaches it and this
    # override would silently ship qBit WITHOUT no-new-privileges. Spelled
    # out literally (not the base file's *security anchor) because YAML
    # anchors do not cross compose -f file boundaries; the value matches
    # x-security in docker-compose.yml.
    security_opt:
      - no-new-privileges:true
    ports:
      - ${LAN_IP}:49156:49156
      - 6881:6881
      - 6881:6881/udp
    # Drop the gluetun health-dependency from the base file. !reset is
    # compose v2.20+; if the user is on something older, edit setup.sh
    # to use a fully separate compose file instead of this override.
    depends_on: !reset null

  # slskd moves to the media bridge with its own published WebUI port
  # when VPN is off (mirror of the qBittorrent override above). The
  # Soulseek peer listen port (50300) is published best-effort, like
  # qBit's 6881. soularr can now reach slskd as http://slskd:5030 on the
  # bridge, but setup-arr-config.py writes the LAN_IP:5030 form
  # unconditionally so one config.ini works in both VPN modes.
  slskd:
    network_mode: bridge
    networks:
      - media
    # Same reasoning as the qBittorrent override above: in VPN mode slskd is
    # in gluetun's namespace and omits security_opt; with VPN off it runs on
    # the bridge in its own namespace, so re-assert no-new-privileges here or
    # the hardening invariant is lost in no-vpn mode. Literal value (anchors
    # don't cross -f boundaries); matches x-security in docker-compose.yml.
    security_opt:
      - no-new-privileges:true
    ports:
      - ${LAN_IP}:5030:5030
      - 50300:50300
    depends_on: !reset null

  # playlistsync moves to the media bridge when VPN is off (same recipe as the
  # slskd/qBittorrent overrides above), but it publishes NO ports — it's a
  # headless worker with no WebUI/listener. It reaches Plex at ${LAN_IP}:32400
  # directly from the bridge. Re-assert no-new-privileges (in VPN mode it
  # inherits gluetun's namespace + hardening and omits security_opt; on the
  # bridge it has its own namespace, so the base file's *security no longer
  # reaches it). Drop the gluetun health-dependency.
  playlistsync:
    network_mode: bridge
    networks:
      - media
    security_opt:
      - no-new-privileges:true
    depends_on: !reset null
    # Mirror the base file's restart policy (on-failure:5) so a hand-edited
    # .env that clears a required source/cred can't crash-loop forever in
    # VPN-off mode either. Restated here (rather than relying on the merge)
    # to keep the cap visible next to the override. See docker-compose.yml.
    restart: on-failure:5
