name: Music Videos image

# Builds + pushes the musicvideos container image to GHCR. The NAS never builds
# locally — docker-compose.yml pins ghcr.io/defessler/mediarr-musicvideos:latest
# and the stack only PULLS it. This workflow is that image's only build path.
#
# The image ships the standalone yt-dlp binary (self-updates at container start
# via `yt-dlp -U`) plus ffmpeg for muxing and python3 for future hooks. Multi-
# arch (amd64 + arm64); both stages are Alpine so QEMU overhead is minimal.
#
# ── ONE-TIME after the first successful run ──────────────────────────────────
# GHCR packages are PRIVATE by default, so the NAS's anonymous `docker compose
# pull` would 401. Make the package public ONCE:
#   GitHub → your profile → Packages → mediarr-musicvideos → Package settings
#   → Change visibility → Public.
# (Nothing here can flip that — it's an account/package setting.)

on:
  push:
    branches: [master]
    paths:
      - 'nas/scripts/musicvideos/**'
      - '.github/workflows/musicvideos-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/defessler/mediarr-musicvideos

jobs:
  build-and-push:
    name: Build + push (amd64, arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # QEMU covers the arm64 Alpine runtime stage (apk add + copy).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nas/scripts/musicvideos
          file: nas/scripts/musicvideos/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
