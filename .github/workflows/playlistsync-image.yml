name: Playlist Sync image

# Builds + pushes the playlistsync container image to GHCR. The NAS never builds
# locally — docker-compose.yml pins ghcr.io/defessler/mediarr-playlistsync:latest
# and the stack only PULLS it. This workflow is that image's only build path.
#
# The image bundles the `sockseek` downloader (built from a PINNED source tag —
# see nas/scripts/playlistsync/Dockerfile) plus python3 + yt-dlp + ffmpeg and the
# three pipeline scripts. Multi-arch (amd64 + arm64); the .NET build cross-
# compiles on the amd64 runner so arm64 doesn't pay QEMU's dotnet tax.
#
# ── ONE-TIME after the first successful run ──────────────────────────────────
# GHCR packages are PRIVATE by default, so the NAS's anonymous `docker compose
# pull` would 401. Make the package public ONCE:
#   GitHub → your profile → Packages → mediarr-playlistsync → Package settings
#   → Change visibility → Public.
# (Nothing here can flip that — it's an account/package setting.)

on:
  push:
    branches: [master]
    paths:
      - 'nas/scripts/playlistsync/**'
      - '.github/workflows/playlistsync-image.yml'
  workflow_dispatch:
    inputs:
      sockseek_ref:
        description: 'sockseek source tag to build (overrides the Dockerfile default)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/defessler/mediarr-playlistsync

jobs:
  build-and-push:
    name: Build + push (amd64, arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # QEMU is only needed for the small arm64 RUNTIME stage (apk add + copy);
      # the heavy .NET build stage is pinned to BUILDPLATFORM and runs natively.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nas/scripts/playlistsync
          file: nas/scripts/playlistsync/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Pass a sockseek_ref override through when dispatched manually;
          # otherwise the Dockerfile's pinned default (v2.6.0) is used.
          build-args: |
            ${{ github.event.inputs.sockseek_ref && format('SOCKSEEK_REF={0}', github.event.inputs.sockseek_ref) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
