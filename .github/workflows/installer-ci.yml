name: Installer CI

# Runs typecheck + electron-vite build on every PR and on push to the
# main branches. Doesn't invoke electron-builder — that lives in
# installer-release.yml on tag push.

on:
  pull_request:
    paths:
      - 'installer/**'
      - 'nas/**'
      - 'test/**'
      - '.github/workflows/installer-ci.yml'
  push:
    branches:
      - master
      - electron-installer
    paths:
      - 'installer/**'
      - 'nas/**'
      - 'test/**'
      - '.github/workflows/installer-ci.yml'
  workflow_dispatch:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: installer/package-lock.json

      # Native deps (ssh2 → cpu-features) need a C toolchain; ubuntu-latest
      # already has gcc/python3, but pin python explicitly so node-gyp picks it up.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build (vite bundles only — electron-builder lives in release.yml)
        run: npm run build

      - name: Upload Vite build output
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vite-build-output
          path: installer/out/
          retention-days: 3

  # Lint shell + Python in nas-payload — the bash/python scripts ship
  # unchanged into nas-payload/ so a syntax typo would break installs
  # without the TS build catching it. Run alongside the typecheck job.
  lint-nas-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck nas/scripts/*.sh + nas/migration/*.sh
        # SC2086 (unquoted vars) and SC2155 (declare+assign on same line)
        # are intentional in many places; suppress them stack-wide so
        # the real issues stand out. Glob updated in v0.4.1: shell
        # scripts moved under nas/scripts/ in v0.3.22 but the workflow
        # kept globbing nas/*.sh, which silently matched nothing.
        #
        # --severity=warning trims out the style + info advisories
        # (SC2001 sed-vs-param-expansion, SC2002 useless-cat, SC2015
        # &&-||-not-if-else, SC2028 echo-escapes, SC2295 quoting-inside-
        # ${..}). Those are real lint items but mostly nitpicks and there
        # are dozens of them in the legacy scripts — landing them all
        # would be a separate refactor. Warning-level findings still
        # block CI: SC2164 (cd-without-||-exit), SC2064 (trap quoting),
        # SC2178/SC2128 (array-vs-string), SC2221/SC2222 (overlapping
        # case patterns).
        run: shellcheck --severity=warning -e SC2086,SC2155 nas/scripts/*.sh nas/scripts/playlistsync/*.sh nas/migration/*.sh

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: py_compile nas/**/*.py
        # Compile-only — catches syntax errors without importing (so
        # we don't need to install deps). The runtime imports
        # (urllib, xml.etree, configparser) are all stdlib.
        # Glob updated in v0.4.2 alongside the shellcheck fix: same
        # v0.3.22-era layout migration moved scripts under nas/scripts/,
        # so the old `nas/*.py nas/indexers/*.py` globs matched nothing.
        run: |
          set -e
          for f in nas/scripts/*.py nas/scripts/indexers/*.py nas/scripts/playlistsync/*.py nas/migration/*.py; do
            python -m py_compile "$f"
          done

  # Family-detection regression gate. Builds the fake-NAS image (test/) and,
  # for each simulated family, runs test/classify.sh inside it and asserts the
  # classification matches what the harness set up. Fast — no DinD / image
  # pulls (classify.sh only reads marker files). Catches regressions in the
  # env-detector family markers/order, which classify.sh mirrors.
  e2e-detect:
    name: Family detection (fake-NAS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build fake-NAS image
        run: docker build -t mediarr-testnas:latest test/
      - name: Assert each simulated family classifies correctly
        run: |
          set -uo pipefail
          fail=0
          for f in synology ugreen asustor terramaster zimaos generic; do
            expected="$f"; [ "$f" = generic ] && expected=linux
            docker rm -f "tn-$f" >/dev/null 2>&1 || true
            # No --privileged needed: classify.sh only reads marker files,
            # which entrypoint.sh lays before it ever touches dockerd.
            docker run -d --name "tn-$f" -e "NAS_FAMILY=$f" mediarr-testnas:latest >/dev/null
            sleep 3
            docker cp test/classify.sh "tn-$f:/tmp/classify.sh"
            got="$(docker exec "tn-$f" bash /tmp/classify.sh | tail -1 | tr -d '[:space:]')"
            docker rm -f "tn-$f" >/dev/null 2>&1 || true
            if [ "$got" = "$expected" ]; then
              echo "✓ $f → $got"
            else
              echo "✗ $f → got '$got', expected '$expected'"; fail=1
            fi
          done
          exit "$fail"

  # Full payload smoke test against a real (in-container) Docker daemon: drops
  # the real nas/ payload into a fake-NAS, runs setup.sh, and asserts the stack
  # came up. Uses Docker-in-Docker (privileged) + pulls a couple of images, so
  # it's slower. Manual-trigger for now (workflow_dispatch) until it's proven
  # green on GitHub-hosted runners; then drop the `if:` to gate every push.
  e2e-smoke:
    name: Payload smoke (DinD)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        family: [generic, ugreen]
    steps:
      - uses: actions/checkout@v6
      - name: Run payload e2e (${{ matrix.family }}, smoke)
        run: bash test/run-e2e.sh --family ${{ matrix.family }} --profile smoke
