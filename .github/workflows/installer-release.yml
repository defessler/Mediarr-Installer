name: Installer Release

# Triggers on tag push matching `installer-v*` (e.g. installer-v0.4.0).
# Builds the portable Windows zip — single artifact, no NSIS .exe, no
# mac/linux. The in-app updater (src/main/updater-service.ts) downloads
# this zip from GitHub Releases on its 6h cadence (or on demand) and
# applies it via a hidden cmd+vbs swap helper. See updater-service.ts
# for the full update flow.
#
# Publishes the release (not draft) so existing installs auto-discover
# the new version. To draft an off-cycle build instead, push a tag and
# manually edit the release to draft via the GitHub UI.
#
# Tag a release:
#   git tag installer-v0.4.0
#   git push origin installer-v0.4.0

on:
  push:
    tags:
      - 'installer-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the release to (e.g. installer-v0.4.0)'
        required: false

permissions:
  contents: write    # required to create the GitHub release

jobs:
  build:
    name: Build Windows zip
    runs-on: windows-latest
    defaults:
      run:
        working-directory: installer

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: installer/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (Windows dir target)
        run: npm run build:win
        env:
          # electron-builder auto-publishes if GH_TOKEN is set. We create
          # the release manually in the release job below.
          GH_TOKEN: ''

      - name: List dist contents (debug)
        if: always()
        run: |
          echo "Contents of installer/dist:"
          dir dist
        shell: cmd

      # Zip electron-builder's win-unpacked/ output. The in-app updater
      # asset matcher (src/main/updater-service.ts:checkForUpdates)
      # requires the filename to match /win-unpacked.*\.zip$/i — keep
      # "win-unpacked" in the name when changing this.
      - name: Zip win-unpacked
        run: |
          cd dist
          7z a -tzip mediarr-installer-win-unpacked.zip win-unpacked
          dir mediarr-installer-win-unpacked.zip
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: mediarr-installer-win
          path: installer/dist/*win-unpacked*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/installer-v')

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # for changelog generation

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: mediarr-installer-win
          path: release-files

      - name: List release files
        run: ls -la release-files/

      # draft: false so the in-app updater (which hits
      # /repos/.../releases?per_page=10 — which DOES include drafts in
      # the response but we filter them out at the client) discovers
      # the release on the first poll.
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: release-files/*
          body: |
            ## Mediarr Installer — ${{ github.ref_name }}

            Desktop wizard that installs the Arr stack onto your Synology
            NAS over SSH. Wraps the bash + Python automation in `nas/`.

            ### Download

            **`mediarr-installer-win-unpacked.zip`** — extract anywhere
            on your Windows machine and run `Mediarr Installer.exe`.

            ### Updates

            Future updates apply themselves automatically:
            1. The wizard polls GitHub Releases every 6 hours.
            2. When a new release is found, you'll see a "New version"
               banner on the Welcome screen.
            3. Click **Install update** to download in the background,
               then **Restart & install** when prompted — the wizard
               swaps itself in place and relaunches.

            ### Migrating from v0.3.x or earlier

            v0.4.0 drops the NSIS installer. If you currently have an
            NSIS-installed copy (Start Menu shortcut → "Mediarr
            Installer"), do this once:

            1. Download the zip below, extract to a new folder of your
               choice (e.g. `C:\Tools\Mediarr Installer\`).
            2. Run `Mediarr Installer.exe`.
            3. Uninstall the old NSIS install via Settings → Apps →
               "Mediarr Installer". Your saved profiles live in
               `%APPDATA%\mediarr-installer\` and survive the swap.

            From then on, in-place updates keep you current with one
            click — no more downloads.

            See [installer/PLAN.md](https://github.com/${{ github.repository }}/blob/master/installer/PLAN.md)
            for the architecture and roadmap.
