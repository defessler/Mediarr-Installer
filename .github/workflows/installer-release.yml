name: Installer Release

# Triggers on tag push matching `installer-v*` (e.g. installer-v0.1.0).
# Builds:
#   - Windows: NSIS .exe installer + latest.yml + .blockmap (for in-place
#     auto-update via electron-updater) AND the historical win-unpacked.zip
#     (extract-anywhere alternative for users who prefer no installer).
#   - macOS:   .dmg per arch + latest-mac.yml + .blockmap.
#   - Linux:   .AppImage + latest-linux.yml + .blockmap.
#
# Publishes the release (not draft) so existing installs auto-discover the
# new version via electron-updater's manifest lookup. To draft an off-cycle
# build instead, delete the tag locally + re-tag, OR push a tag matching
# 'installer-vXXX-draft' (not implemented yet, just a future hook).
#
# Tag a release:
#   git tag installer-v0.1.0
#   git push origin installer-v0.1.0

on:
  push:
    tags:
      - 'installer-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the release to (e.g. installer-v0.1.0)'
        required: false

permissions:
  contents: write    # required to create the GitHub release

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: NSIS .exe (for true in-place updates) + matching
          # latest.yml + .blockmap (electron-updater needs all three). We
          # ALSO keep the unpacked zip so users who don't want to run an
          # installer have a portable option, and so the legacy
          # "Download zip" fallback in WhatsNew.tsx keeps working.
          - os: windows-latest
            target: win
            # Multiple globs in a single setting — actions/upload-artifact
            # supports newline-separated patterns under `path:`. See the
            # `path:` line in the upload step below for the actual list.
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: installer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: installer/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (${{ matrix.target }})
        run: npm run build:${{ matrix.target }}
        env:
          # electron-builder auto-publishes if GH_TOKEN is set. We do the
          # release step manually below so each platform's artifacts
          # gather into one release; clear it here.
          GH_TOKEN: ''

      - name: List dist contents (debug)
        if: always()
        run: |
          echo "Contents of installer/dist:"
          ls -la dist || dir dist
        shell: bash

      # The legacy "extract anywhere" zip stays alongside the NSIS .exe
      # so users who don't want to run an installer still have a copy,
      # and the WhatsNew banner's fallback "Download zip" button keeps
      # working on older builds that don't have the in-place updater.
      # The filename MUST contain "win-unpacked" — main/index.ts'
      # asset-finder matches on that substring.
      - name: Zip win-unpacked (Windows only)
        if: matrix.target == 'win'
        run: |
          cd dist
          7z a -tzip mediarr-installer-win-unpacked.zip win-unpacked
          ls -la mediarr-installer-win-unpacked.zip
        shell: bash

      # Upload EVERYTHING electron-updater needs plus the legacy zip.
      # Newline-separated globs are matched independently; missing
      # globs are fine (if-no-files-found: warn) because mac/linux
      # don't have .exe and win doesn't have .dmg/.AppImage.
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediarr-installer-${{ matrix.target }}
          path: |
            installer/dist/*.exe
            installer/dist/*.dmg
            installer/dist/*.AppImage
            installer/dist/*.zip
            installer/dist/latest*.yml
            installer/dist/*.blockmap
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/installer-v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # for changelog generation

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir -p release-files
          # Whitelist of extensions/patterns. The latest*.yml + .blockmap
          # are critical for electron-updater's in-place flow — without
          # them, the auto-updater fails the manifest lookup and the
          # user is stuck on whatever version they originally installed.
          find artifacts -type f \
            \( -name '*.exe' \
            -o -name '*.dmg' \
            -o -name '*.AppImage' \
            -o -name '*win-unpacked*.zip' \
            -o -name 'latest*.yml' \
            -o -name '*.blockmap' \
            \) \
            -exec cp -v {} release-files/ \;
          ls -la release-files/

      # draft: false so electron-updater discovers the release on the
      # first poll. The GitHub `/releases/latest` REST endpoint skips
      # draft releases entirely — a drafted release is invisible to
      # the auto-updater and to the in-app GitHub fetch in main/index.ts.
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: release-files/*
          body: |
            ## Mediarr Installer — ${{ github.ref_name }}

            Desktop wizard that installs the Arr stack onto your Synology
            NAS over SSH. Wraps the bash + Python automation in `nas/`.

            ### Downloads
            - **Windows (recommended)**: `Mediarr Installer Setup *.exe` — NSIS installer; in-place auto-update from this version onwards.
            - **Windows (portable)**: `mediarr-installer-win-unpacked.zip` — extract anywhere, run `Mediarr Installer.exe`; manual update via Download-zip button.
            - **macOS**: `*.dmg` — separate dmgs for arm64 and x64 (unsigned)
            - **Linux**: `*.AppImage` — universal x64 build

            ### Updating from an older version
            - If you currently have v0.3.23 or earlier (installed from the zip): download the NSIS `.exe` below and run it once. After that, future updates appear inside the wizard via the WhatsNew banner — one click, no redownload.
            - If you installed via NSIS already: nothing to do — open the wizard and it'll prompt to install this version automatically.

            See [installer/PLAN.md](https://github.com/${{ github.repository }}/blob/master/installer/PLAN.md)
            for the architecture and roadmap.
