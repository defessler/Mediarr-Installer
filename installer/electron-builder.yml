appId: com.defessler.nas-arr-installer
productName: NAS Arr Installer
directories:
  output: dist
  buildResources: resources
files:
  - "out/**/*"
  - "package.json"
extraResources:
  - from: "resources/nas-payload"
    to: "nas-payload"
    filter:
      - "**/*"
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  artifactName: "${productName}-${version}-Setup.${ext}"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
  category: public.app-category.utilities
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
  category: Utility
