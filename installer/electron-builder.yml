appId: com.defessler.nas-arr-installer
productName: NAS Arr Installer
directories:
  output: dist
  buildResources: resources
files:
  - "out/**/*"
  - "package.json"
extraResources:
  - from: "resources/nas-payload"
    to: "nas-payload"
    filter:
      - "**/*"
asar: true
# TODO: branding icons. Drop a 1024x1024 PNG at resources/icon.png and
# electron-builder will auto-generate ICO/ICNS. Until then we let it fall
# back to the default Electron icon.
win:
  # `dir` target = unpacked folder only (dist/win-unpacked/). No
  # installer, no portable wrapper, no NSIS. Run by double-clicking
  # `NAS Arr Installer.exe` inside the folder. Per-user data
  # (logs, profiles) goes to %APPDATA%/nas-arr-installer.
  target:
    - target: dir
      arch:
        - x64
  # Skip rcedit + signtool entirely. They live in the winCodeSign cache
  # whose extraction fails on Windows without Developer Mode (the archive
  # contains macOS dylib symlinks that need elevated privileges to write).
  # We don't sign and we don't need to rewrite the exe metadata for v0.1.
  signAndEditExecutable: false
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.utilities
  # macOS code signing skipped for v1 — set identity: null to opt out
  # explicitly so electron-builder doesn't try ad-hoc signing on CI.
  identity: null
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
