appId: com.defessler.mediarr-installer
productName: Mediarr Installer
directories:
  output: dist
  buildResources: resources
files:
  - "out/**/*"
  - "package.json"
extraResources:
  - from: "resources/nas-payload"
    to: "nas-payload"
    filter:
      - "**/*"
asar: true
# Publish config drives the in-app updater's GitHub Releases lookup at
# runtime (see src/main/updater-service.ts). electron-builder also reads
# it during local `--publish always` builds — we don't use that, the CI
# workflow creates the release manually after building.
publish:
  provider: github
  owner: defessler
  repo: Mediarr-Installer
# TODO: branding icons. Drop a 1024x1024 PNG at resources/icon.png and
# electron-builder will auto-generate ICO/ICNS. Until then we let it fall
# back to the default Electron icon.
win:
  # `dir` target = electron-builder produces dist/win-unpacked/<files>
  # only. No NSIS, no installer wrapping. The CI workflow zips the
  # win-unpacked folder into mediarr-installer-win-unpacked.zip and
  # publishes it as the sole release artifact. The in-app updater
  # (src/main/updater-service.ts) downloads that zip, extracts to
  # %TEMP%, and a hidden cmd+vbs swap helper robocopies the new files
  # over the running install on next restart — fully in place, no
  # installer experience for the user, no reliance on electron-updater.
  #
  # Why this over `target: portable`: electron-builder's portable
  # target self-extracts to %TEMP% on every launch, which conflicts
  # with our updater's "swap the install dir" strategy (the install
  # dir would change paths every launch). `dir` gives us a stable
  # folder the user actually controls.
  target:
    - target: dir
      arch:
        - x64
  # Skip rcedit + signtool entirely. They live in the winCodeSign
  # cache whose extraction fails on Windows without Developer Mode
  # (the archive contains macOS dylib symlinks that need elevated
  # privileges to write). We don't sign and we don't need to rewrite
  # the exe metadata.
  signAndEditExecutable: false
